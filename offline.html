<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#333">
  <title>Offline | LCHS Go</title>
  <style>
    :root {
      --offline-bg: #466272;
      --surface-border: rgba(255, 255, 255, 0.16);
      --shadow-strong: 0 24px 50px rgba(0, 0, 0, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      overflow: hidden;
      font-family: "Niramit", system-ui, sans-serif;
      color: white;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.16), transparent 36%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.18)),
        var(--offline-bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08), transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(255, 255, 255, 0.05), transparent 24%);
      pointer-events: none;
    }

    .center {
      position: relative;
      width: min(100%, 520px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px 28px;
      border: 1px solid var(--surface-border);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.24), rgba(0, 0, 0, 0.14));
      box-shadow: var(--shadow-strong);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      text-align: center;
    }

    svg {
      width: min(220px, 55vw);
      height: auto;
      opacity: 0.96;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 2.5rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      max-width: 28ch;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.8);
    }

    button {
      padding: 10px 18px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: inherit;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.16);
      transition: transform 140ms ease, background-color 140ms ease, border-color 140ms ease;
    }

    button:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.24);
    }

    button:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.9);
      outline-offset: 3px;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

    <h1>You're Offline!</h1>
    <p>LCHS Go will reconnect automatically when your connection comes back.</p>
    <button onclick="location.reload();">Reload</button>
  </main>
  <script defer>
    const savedSettings = JSON.parse(localStorage.getItem("settings") || "{}");
    const hue = Number(savedSettings.colorTheme ?? 3);
    let background = hslToHex(hue, 50, 50);

    if (hue === 0) {
      background = hslToHex(0, 0, 90);
    } else if (hue === 360) {
      background = hslToHex(0, 0, 25);
    } else if (hue === 359) {
      background = hslToHex(0, 0, 0);
    }

    document.documentElement.style.setProperty("--offline-bg", background);

    function hslToHex(h, s, l) {
      l /= 100;
      const a = s * Math.min(l, 1 - l) / 100;
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');   // convert to Hex and prefix "0" if needed
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    window.addEventListener('online', () => {
      window.history.pushState("", "now", "/?now");
      window.location.reload();
    });

    async function checkNetworkAndReload() {
      try {
        const response = await fetch('.');
        // Verify we get a valid response from the server
        if (response.status >= 200 && response.status < 500) {
          window.history.pushState("", "now", "/?now");
          window.location.reload();
          return;
        }
      } catch {
        // Unable to connect to the server, ignore.
      }
      window.setTimeout(checkNetworkAndReload, 2500);
    }

    checkNetworkAndReload();
  </script>
